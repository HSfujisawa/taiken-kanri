*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

</style>

}

let selectedCourses=[];
function renderCourseList(){
  const kw=courseSearch;
  const filtered=kw?COURSES.filter(c=>c.name.includes(kw)||c.code.includes(kw)):COURSES;
  if(!filtered.length) return '<div style="padding:12px;font-size:13px;color:var(--text3);text-align:center">Ť©≤ŚĹď„Ā™„Āó</div>';
  return filtered.slice(0,60).map(c=>{
    const already=selectedCourses.some(s=>s.code===c.code);
    const safeName=c.name.replace(/'/g,"\\'");
    return `<div onclick="${already?'':` addCourse('${c.code}','${safeName}')`}"
      style="padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);cursor:${already?'default':'pointer'};
      background:${already?'var(--c1l)':'var(--surface)'};color:${already?'var(--c1)':'var(--text)'};display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span>${c.name}</span><span style="font-size:11px;color:${already?'var(--c1)':'var(--text3)'};flex-shrink:0">${c.code}${already?' ‚úď':''}</span>
    </div>`;
  }).join('');
}
function renderSelectedCourses(){
  if(!selectedCourses.length) return '<div style="font-size:12px;color:var(--text3)">Ť¨õŚļßśú™ÁôĽťĆ≤</div>';
  return '<div style="display:flex;flex-wrap:wrap;gap:6px">'+selectedCourses.map(c=>`
    <div style="display:inline-flex;align-items:center;gap:4px;background:var(--c6l);color:var(--c6);border-radius:20px;padding:4px 10px;font-size:12px">
      <span>${c.name}</span><span style="font-size:11px;opacity:.7">${c.code}</span>
      <button onclick="removeCourse('${c.code}')" style="background:none;border:none;cursor:pointer;color:var(--c6);font-size:15px;padding:0 0 0 2px;line-height:1">√ó</button>
    </div>`).join('')+'</div>';
}
function addCourse(code,name){
  if(!selectedCourses.some(c=>c.code===code)){
    selectedCourses.push({code,name});
    const el=document.getElementById('course-list'); if(el) el.innerHTML=renderCourseList();
    const sel=document.getElementById('selected-courses'); if(sel) sel.innerHTML=renderSelectedCourses();
  }
}
function removeCourse(code){
  selectedCourses=selectedCourses.filter(c=>c.code!==code);
  const el=document.getElementById('course-list'); if(el) el.innerHTML=renderCourseList();
  const sel=document.getElementById('selected-courses'); if(sel) sel.innerHTML=renderSelectedCourses();
}

const TOP_TABS = {
  active: [
    {id:'all', label:'ŚÖ®Śď°'},
    {id:'today', label:'šĽäśó•ÁôĽś†°'},
    {id:'tomorrow', label:'śėéśó•ÁôĽś†°'},

function switchTab(t){
  currentTab = t;
  allSearchQuery='';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+t).classList.add('active');
  document.querySelectorAll('.section').forEach(el=>el.style.display='none');
  document.getElementById('section-'+t).style.display='block';
  // top tabs
  const tc = document.getElementById('top-tabs-container');
  if(TOP_TABS[t]){
    tc.innerHTML = TOP_TABS[t].map(tb=>`<button class="top-tab ${activeSubTab===tb.id?'active':''}" onclick="switchSub('${tb.id}')">${tb.label}</button>`).join('');
  } else {
    tc.innerHTML='';
  }
  document.getElementById('scroll-area').scrollTop=0;
  renderSection(t);
}
function switchSub(t){
  activeSubTab=t;
  document.querySelectorAll('.top-tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.top-tab').forEach(el=>{ if(el.textContent===TOP_TABS[currentTab].find(x=>x.id===t)?.label) el.classList.add('active'); });
  renderSection('active');
}

function updateBadges(){
  ['prospect','first','active'].forEach(f=>{
    const cnt=students.filter(s=>s.flow===f && !s.cancelled).length;
    const el=document.getElementById('nb-'+f);
    if(el){ el.textContent=cnt; el.style.display=cnt?'block':'none'; }
  });
}

function renderSection(t){
  updateBadges();
  if(t==='register') renderRegister();
  else if(t==='prospect') renderProspect();
  else if(t==='first') renderFirst();
  else if(t==='active') renderActive();
  else if(t==='enrolled') renderEnrolled();
  else if(t==='all') renderAll();
  else if(t==='check') renderCheck();
}

function loadCSV(input){
  const file = input.files[0];
  if(!file){return;}
  const reader = new FileReader();
  reader.onload = function(e){
    const text = e.target.result;
    // śĖáŚ≠óŚĆĖ„ĀĎŚĮĺÁ≠ĖÔľöShiftJIS„ĀģŚ†īŚźą„āāŤ©¶„ĀŅ„āč
    parseCSVAndCheck(text);
  };
  // „Āĺ„ĀöUTF-8„ĀßŤ©¶„Āô
  reader.readAsText(file, 'UTF-8');
  // UTF-8„ĀßśĖáŚ≠óŚĆĖ„ĀĎ„Āó„Āü„āČShiftJIS„ĀßŚÜćŤ™≠„ĀŅŤĺľ„ĀŅ
  reader.onerror = function(){
    const reader2 = new FileReader();
    reader2.onload = function(e){ parseCSVAndCheck(e.target.result); };
    reader2.readAsText(file, 'Shift-JIS');
  };
}

function splitCSVLine(line){
  const result=[];
  let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else{cur+=c;}
  }
  result.push(cur);
  return result;
}

    const lastName  = nameMatch[1];
    const firstName = nameMatch[2];
    const name = lastName + ' ' + firstName;

    // ÁĒ≥Ťĺľśó•
    const dateMatch = t.match(/(\d{4}\/\d{2}\/\d{2})/);
    const applyDate = dateMatch ? dateMatch[1].replace(/\//g,'-') : TODAY;

    // ÁĒ≥ŤĺľŚÜÖŚģĻ
    let applyLabel = '„ĀĚ„ĀģšĽĖ';
    if(t.includes('1śó•šĹďť®ď')||t.includes('ÔľĎśó•šĹďť®ď')) applyLabel='ÔľĎśó•šĹďť®ď';
    else if(t.includes('Ť≥áśĖôŤęčśĪā')) applyLabel='Ť≥áśĖôŤęčśĪā';
    else if(t.includes('śčõŚĺÖŤ¨õÁŅí')||t.includes('śčõŚĺÖÁä∂ŤęčśĪā')) applyLabel='śčõŚĺÖŤ¨õÁŅí';
    else if(t.includes('ŚÖ¨ťĖčśéąś•≠')) applyLabel='ŚÖ¨ťĖčśéąś•≠';

    // Ś≠¶ŚĻī„ā≥„Éľ„ÉČÔľöśúÄŚĺĆ„Āģ„ÄĆťęėÁ≠ČŚ≠¶ś†°„Äć„ÄĆšł≠Ś≠¶ś†°„Äć„ĀģÁõīŚĺĆ„āíŚŹāÁÖß
    let grade = '';
    const gradeMap = {'31':'ťęė1','32':'ťęė2','33':'ťęė3','34':'ťęėŚćí','21':'šł≠1','22':'šł≠2','23':'šł≠3'};
    const schoolTypeMatches = [...t.matchAll(/(?:ťęėÁ≠ČŚ≠¶ś†°|šł≠Ś≠¶ś†°)/g)];
    if(schoolTypeMatches.length > 0){
      const lastMatch = schoolTypeMatches[schoolTypeMatches.length-1];
      const afterSchool = t.slice(lastMatch.index + lastMatch[0].length);
      const gm = afterSchool.match(/\s+(3[1-4]|2[1-3])\s/);
      if(gm) grade = gradeMap[gm[1]]||'';
    }

    // Ś≠¶ś†°Śźć
    const schoolMatch = t.match(/(?:Á•ěŚ•ąŚ∑ĚÁúĆ|śĚĪšļ¨ťÉĹ|ŚüľÁéČÁúĆ|ŚćÉŤĎČÁúĆ|ťĚôŚ≤°ÁúĆ)\s+([^\s„ÄÄ]+(?:ťęėÁ≠ČŚ≠¶ś†°|ťęėś†°|šł≠Ś≠¶ś†°|šł≠Ś≠¶|ťęėťôĘ|Ś≠¶ťôĘ|ťęėŚįā))/);
    const school = schoolMatch ? schoolMatch[1].replace('ťęėÁ≠ČŚ≠¶ś†°','ťęėś†°') : '';

    // „Āć„Ā£„Āč„ĀĎ
    let triggerLabel = '„ĀĚ„ĀģšĽĖ';
    if(t.includes('ŚŹčšļļ')||t.includes('Áü•šļļ')) triggerLabel='ŚŹčšļļÁīĻšĽč';
    else if(t.includes('ťÖćŚłÉ')) triggerLabel='ťÖćŚłÉ';
    else if(t.includes('Śł≥Á•®')) triggerLabel='Śł≥Á•®ŤŅĒŚćīťĚĘŤęá';

    results.push({name, lastName, firstName, school, grade, applyLabel, triggerLabel, applyDate});
  }

  // ťáćŤ§áťô§ŚéĽÔľąŚźĆ„ĀėśįŹŚźćÔľČ
  const seen = new Set();
  return results.filter(r=>{
    const key = r.name.replace(/\s/g,'');
    if(seen.has(key)) return false;
    seen.add(key); return true;
  });
}

function doCheck(){
  const text=document.getElementById('check-textarea')?.value.trim();
  if(!text){showToast('„Éá„Éľ„āŅ„āíŤ≤ľ„āäšĽė„ĀĎ„Ā¶„ĀŹ„Ā†„Āē„ĀĄ');return;}
  
  const lines=text.trim().split('\n').filter(l=>l.trim());
  const dataLines=lines.filter(l=>/^\d{7,}/.test(l.trim()));
  
  parsedWebApplicants=parseWebData(text);

          „ÉĽIDŤ°ĆśēįÔľąśēįŚ≠ó7ś°ĀŚßč„Āĺ„āäÔľČ: ${dataLines.length}Ť°Ć<br>
          „ÉĽ„ÄĆ0015„Äć„āíŚźę„āÄŤ°Ć: ${lines.filter(l=>l.includes('0015')).length}Ť°Ć
        </div>
        <div style="font-size:12px;color:var(--text2)">
          ŚÖąť†≠20śĖáŚ≠ó: <code style="background:var(--bg);padding:2px 6px;border-radius:4px">${text.slice(0,50).replace(/</g,'&lt;')}</code>

function renderCheckResult(){

  // ÁôĽťĆ≤śłą„ĀŅśįŹŚźć„É™„āĻ„ÉąÔľą„āĻ„Éö„Éľ„āĻ„Ā™„Āó„ÉĽŚÖ®ŤßíŚćäŤßíÁĶĪšłÄÔľČ
  const registered=new Set(students.map(s=>s.name.replace(/\s/g,'')));
  const unregistered=parsedWebApplicants.filter(a=>!registered.has(a.name.replace(/\s/g,'')));

  area.innerHTML=`

    </div>
    ${unregistered.map(a=>`
    <div class="card" style="border-left:3px solid #A32D2D">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px">
        <div>
          <div style="font-size:15px;font-weight:600">${a.name}</div>
          <div style="font-size:12px;color:var(--text2)">${a.school} ¬∑ ${a.grade}</div>
        </div>
        <span class="badge b-red">śú™ÁôĽťĆ≤</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        <span class="badge b-amber">${a.applyLabel}</span>
        <span class="badge b-purple">„Āć„Ā£„Āč„ĀĎ: ${a.triggerLabel}</span>
        <span class="badge b-gray">ÁĒ≥Ťĺľ: ${fmt(a.applyDate)}</span>
      </div>
      <button class="btn btn-primary btn-full btn-sm" onclick="quickRegister('${a.name.replace(/'/g,"\\'")}','${a.school.replace(/'/g,"\\'")}','${a.grade}','${a.applyLabel}','${a.triggerLabel}','${a.applyDate}')">
        „Āď„Āģ„Āĺ„ĀĺŤ¶čŤĺľ„ĀłÁôĽťĆ≤„Āô„āč ‚Üí
      </button>
    </div>`).join('')}
    ${already.length?`

    ${already.map(a=>`

      <div class="card-header">
        <div class="card-info"><div class="card-name">${a.name}</div><div class="card-meta">${a.school} ¬∑ ${a.grade}</div></div>
        <span class="badge b-teal">ÁôĽťĆ≤śłą</span>
      </div>
    </div>`).join('')}`:''}`;
}

async function quickRegister(name,school,grade,applyLabel,triggerLabel,applyDate){
  if(!confirm(`${name}„Āē„āď„āíŤ¶čŤĺľ„ĀęÁôĽťĆ≤„Āó„Āĺ„Āô„ĀčÔľü`)) return;
  const parts=name.split(' ');
  loader(true);
  try{
    await createStudent({
      name,school,grade,
      apply_type:applyLabel,
      apply_trigger:triggerLabel,
      content:'',
      created_at:applyDate||TODAY,
      flow:'prospect',
      active_history:[],
      active_done_today:false
    });
    await loadStudents();
    showToast(name+'„Āē„āď„āíÁôĽťĆ≤„Āó„Āĺ„Āó„Āü');
    renderCheckResult();
  }catch(e){showToast('„ā®„É©„Éľ„ĀĆÁôļÁĒü„Āó„Āĺ„Āó„Āü');}
  loader(false);
}
