<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>体験生管理システム</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap');
/* ---- PASSWORD SCREEN ---- */
#pw-screen{position:fixed;inset:0;background:#1A1916;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:32px}
#pw-screen.hidden{display:none}
.pw-logo{width:56px;height:56px;background:#1D9E75;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.pw-logo svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2}
.pw-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px;font-family:'Noto Sans JP',sans-serif}
.pw-sub{font-size:13px;color:#888;margin-bottom:28px;font-family:'Noto Sans JP',sans-serif}
.pw-input{width:100%;max-width:300px;padding:13px 16px;border-radius:10px;border:1.5px solid #333;background:#2A2926;color:#fff;font-size:16px;font-family:'Noto Sans JP',sans-serif;margin-bottom:12px;text-align:center;letter-spacing:.1em}
.pw-input:focus{outline:none;border-color:#1D9E75}
.pw-btn{width:100%;max-width:300px;padding:13px;border-radius:10px;background:#1D9E75;color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.pw-btn:active{opacity:.85}
.pw-error{color:#F08080;font-size:13px;margin-top:8px;font-family:'Noto Sans JP',sans-serif;display:none}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c1:#1D9E75;--c1l:#E1F5EE;--c1d:#157A5A;
  --c2:#378ADD;--c2l:#E6F1FB;
  --c3:#BA7517;--c3l:#FAEEDA;
  --c4:#D4537E;--c4l:#FBEAF0;
  --c5:#639922;--c5l:#EAF3DE;
  --c6:#534AB7;--c6l:#EEEDFE;
  --cg:#888780;--cgl:#F1EFE8;
  --bg:#F7F6F2;--surface:#FFFFFF;
  --border:#E8E6DF;--border2:#D8D6CE;
  --text:#1A1916;--text2:#666460;--text3:#999690;
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:0 4px 16px rgba(0,0,0,.12),0 8px 32px rgba(0,0,0,.08);
}
html,body{height:100%;background:var(--bg);font-family:'Noto Sans JP',sans-serif;color:var(--text);font-size:15px;line-height:1.5}

/* ---- LAYOUT ---- */
#app{display:flex;flex-direction:column;height:100dvh;height:100vh;max-width:480px;margin:0 auto;background:var(--bg);position:relative}
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 0;flex-shrink:0;box-shadow:0 1px 0 var(--border)}
#header h1{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.05em;margin-bottom:10px}
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:80px}
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}

/* ---- TABS (bottom nav) ---- */
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 10px;font-size:10px;color:var(--text3);cursor:pointer;position:relative;border:none;background:none;font-family:'Noto Sans JP',sans-serif;transition:color .15s}
.nav-item.active{color:var(--c1)}
.nav-item svg{width:22px;height:22px;margin-bottom:3px;stroke-width:1.8}
.nav-badge{position:absolute;top:6px;right:50%;transform:translateX(12px);background:var(--c4);color:#fff;border-radius:10px;font-size:9px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}

/* ---- TOP TABS (sub) ---- */
.top-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.top-tabs::-webkit-scrollbar{display:none}
.top-tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border2);background:none;color:var(--text2);white-space:nowrap;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.top-tab.active{background:var(--c1);color:#fff;border-color:var(--c1)}

/* ---- CARDS ---- */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;gap:10px}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:600;color:var(--text)}
.card-meta{font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-body{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}

/* ---- BADGES ---- */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-teal{background:var(--c1l);color:var(--c1)}
.b-blue{background:var(--c2l);color:var(--c2)}
.b-amber{background:var(--c3l);color:var(--c3)}
.b-pink{background:var(--c4l);color:var(--c4)}
.b-green{background:var(--c5l);color:var(--c5)}
.b-purple{background:var(--c6l);color:var(--c6)}
.b-gray{background:var(--cgl);color:var(--cg)}
.b-red{background:#FCEBEB;color:#A32D2D}

/* ---- KOMA ---- */
.koma-0{background:#FCEBEB;color:#A32D2D}
.koma-low{background:var(--c3l);color:var(--c3)}
.koma-mid{background:var(--c2l);color:var(--c2)}
.koma-high{background:var(--c1l);color:var(--c1)}

/* ---- TICKET ---- */
.ticket{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.ticket:active{transform:scale(.98)}
.ticket.today::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c3)}
.ticket.tomorrow::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c2)}
.ticket-pl{padding-left:18px}
.ticket-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ticket-name{font-size:15px;font-weight:600}
.ticket-meta{font-size:12px;color:var(--text2);margin-top:2px}
.ticket-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* ---- FORMS ---- */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
label{font-size:12px;font-weight:600;color:var(--text2)}
input,select,textarea{border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:15px;font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text);width:100%;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--c1);box-shadow:0 0 0 3px var(--c1l)}
textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ---- BUTTONS ---- */
.btn{padding:11px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--c1);color:#fff;border-color:var(--c1)}
.btn-primary:active{background:var(--c1d)}
.btn-full{width:100%}
.btn-danger{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-green{background:var(--c5l);color:var(--c5);border-color:var(--c5)}

/* ---- MODAL ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92dvh;max-height:92vh;overflow-y:auto;padding:0;box-shadow:var(--shadow-lg)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.modal-head{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--cgl);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-body{padding:16px}

/* ---- HISTORY ---- */
.hist-item{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px}
.hist-date{font-size:11px;color:var(--text3);margin-bottom:3px}
.hist-text{font-size:13px;color:var(--text)}

/* ---- MISC ---- */
.empty{text-align:center;padding:48px 16px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}
.section-header{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.04em;margin-bottom:12px}
.info-note{background:var(--c2l);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--c2);margin-bottom:14px;font-weight:500}
.today-zone{background:var(--c3l);border-radius:var(--radius);padding:14px;margin-bottom:14px}
.today-zone-title{font-size:13px;font-weight:700;color:var(--c3);margin-bottom:10px}
.divider{height:1px;background:var(--border);margin:14px 0}

/* ---- OVERVIEW TABLE ---- */
.ov-table{width:100%;border-collapse:collapse;font-size:13px}
.ov-table th{text-align:left;padding:8px 10px;font-size:11px;font-weight:700;color:var(--text3);border-bottom:1px solid var(--border)}
.ov-table td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.ov-table tr:last-child td{border-bottom:none}

/* ---- CANCEL ---- */
.cancelled-row{opacity:.5}
.cancelled-row td{text-decoration:line-through}
.cancel-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;background:#FCEBEB;color:#A32D2D;white-space:nowrap}
.all-filter{display:flex;gap:6px;margin-bottom:14px}
.all-filter button{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border2);background:none;color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.all-filter button.active{background:var(--text);color:#fff;border-color:var(--text)}

/* ---- LOADER ---- */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
#loader.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--c1);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{font-size:14px;color:var(--text2)}

/* ---- TOAST ---- */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- パスワード画面 -->
<div id="pw-screen">
  <div class="pw-logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <div class="pw-title">体験生管理システム</div>
  <div class="pw-sub">パスワードを入力してください</div>
  <input class="pw-input" id="pw-input" type="password" placeholder="パスワード" onkeydown="if(event.key==='Enter')checkPw()">
  <button class="pw-btn" onclick="checkPw()">ログイン</button>

<div id="app">

      <span class="nav-badge" id="nb-prospect" style="display:none">0</span>
    </button>
    <button class="nav-item" onclick="switchTab('first')" id="nav-first">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>初回
      <span class="nav-badge" id="nb-first" style="display:none">0</span>
    </button>
    <button class="nav-item" onclick="switchTab('active')" id="nav-active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>受講中

      <span class="nav-badge" id="nb-check" style="display:none">0</span>
    </button>
  </nav>
</div>

<!-- モーダル -->
<div class="modal-overlay hidden" id="modal" onclick="handleModalBg(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hceqwfwvgorummvxzkiu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZXF3Znd2Z29ydW1tdnh6a2l1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODgzNjQsImV4cCI6MjA5NDc2NDM2NH0.SDQ4BTNtvRBeg8jmxp0wV9-oLyn_wOrKmeHB9GoFjKI';
const API = `${SUPABASE_URL}/rest/v1/students`;
const HEADERS = {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`};

const TODAY = new Date().toLocaleDateString('sv-SE');
const TOMORROW = (()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toLocaleDateString('sv-SE')})();

let students = [];
let currentTab = 'register';
let activeSubTab = 'all';
let allFilter = 'active'; // 'active' | 'cancelled'

const CANCEL_REASONS = ['忙しいから','他塾に決めた','映像が合わない','音信不通','その他'];

// ---- API ----
async function apiFetch(path, opts={}){
  const res = await fetch(API+path, {headers:HEADERS, ...opts});
  if(!res.ok) throw new Error(await res.text());
  if(res.status===204) return null;
  return res.json();
}
async function loadStudents(){
  students = await apiFetch('?order=id.asc&select=*') || [];
}
async function createStudent(data){
  return apiFetch('', {method:'POST', headers:{...HEADERS,'Prefer':'return=representation'}, body:JSON.stringify(data)});
}
async function updateStudent(id, data){
  data.updated_at = new Date().toISOString();
  return apiFetch(`?id=eq.${id}`, {method:'PATCH', headers:{...HEADERS,'Prefer':'return=representation'}, body:JSON.stringify(data)});
}

// ---- HELPERS ----
function getVisitDate(s){ return s.active_next_date || s.first_guidance_date || ''; }
function komaClass(n){ const v=parseInt(n); if(isNaN(v)||n===''||n===null) return 'koma-mid'; if(v===0) return 'koma-0'; if(v<=3) return 'koma-low'; if(v<=8) return 'koma-mid'; return 'koma-high'; }
function komaLabel(n){ const v=parseInt(n); if(isNaN(v)||n===''||n===null||n===undefined) return '未設定'; return v+'コマ'; }
function getInitials(n){ return (n||'？').slice(0,2); }

let allSearchQuery='';
let courseSearch='';
let selectedCourses=[];
function renderCourseList(){
  const kw=courseSearch;
  const filtered=kw?COURSES.filter(c=>c.name.includes(kw)||c.code.includes(kw)):COURSES;
  if(!filtered.length) return '<div style="padding:12px;font-size:13px;color:var(--text3);text-align:center">該当なし</div>';
  return filtered.slice(0,60).map(c=>{
    const already=selectedCourses.some(s=>s.code===c.code);
    const safeName=c.name.replace(/'/g,"\\'");
    return `<div onclick="${already?'':` addCourse('${c.code}','${safeName}')`}"
      style="padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);cursor:${already?'default':'pointer'};
      background:${already?'var(--c1l)':'var(--surface)'};color:${already?'var(--c1)':'var(--text)'};display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span>${c.name}</span><span style="font-size:11px;color:${already?'var(--c1)':'var(--text3)'};flex-shrink:0">${c.code}${already?' ✓':''}</span>
    </div>`;
  }).join('');
}
function renderSelectedCourses(){
  if(!selectedCourses.length) return '<div style="font-size:12px;color:var(--text3)">講座未登録</div>';
  return '<div style="display:flex;flex-wrap:wrap;gap:6px">'+selectedCourses.map(c=>`
    <div style="display:inline-flex;align-items:center;gap:4px;background:var(--c6l);color:var(--c6);border-radius:20px;padding:4px 10px;font-size:12px">
      <span>${c.name}</span><span style="font-size:11px;opacity:.7">${c.code}</span>
      <button onclick="removeCourse('${c.code}')" style="background:none;border:none;cursor:pointer;color:var(--c6);font-size:15px;padding:0 0 0 2px;line-height:1">×</button>
    </div>`).join('')+'</div>';
}
function addCourse(code,name){
  if(!selectedCourses.some(c=>c.code===code)){
    selectedCourses.push({code,name});
    const el=document.getElementById('course-list'); if(el) el.innerHTML=renderCourseList();
    const sel=document.getElementById('selected-courses'); if(sel) sel.innerHTML=renderSelectedCourses();
  }
}
function removeCourse(code){
  selectedCourses=selectedCourses.filter(c=>c.code!==code);
  const el=document.getElementById('course-list'); if(el) el.innerHTML=renderCourseList();
  const sel=document.getElementById('selected-courses'); if(sel) sel.innerHTML=renderSelectedCourses();
}

// ---- TABS ----
const TOP_TABS = {
  active: [
    {id:'all', label:'全員'},
    {id:'today', label:'今日登校'},
    {id:'tomorrow', label:'明日登校'},
  ]
};

function switchTab(t){
  currentTab = t;
  allSearchQuery='';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+t).classList.add('active');
  document.querySelectorAll('.section').forEach(el=>el.style.display='none');
  document.getElementById('section-'+t).style.display='block';
  // top tabs
  const tc = document.getElementById('top-tabs-container');
  if(TOP_TABS[t]){
    tc.innerHTML = TOP_TABS[t].map(tb=>`<button class="top-tab ${activeSubTab===tb.id?'active':''}" onclick="switchSub('${tb.id}')">${tb.label}</button>`).join('');
  } else {
    tc.innerHTML='';
  }
  document.getElementById('scroll-area').scrollTop=0;
  renderSection(t);
}
function switchSub(t){
  activeSubTab=t;
  document.querySelectorAll('.top-tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.top-tab').forEach(el=>{ if(el.textContent===TOP_TABS[currentTab].find(x=>x.id===t)?.label) el.classList.add('active'); });
  renderSection('active');
}

function updateBadges(){
  ['prospect','first','active'].forEach(f=>{
    const cnt=students.filter(s=>s.flow===f && !s.cancelled).length;
    const el=document.getElementById('nb-'+f);
    if(el){ el.textContent=cnt; el.style.display=cnt?'block':'none'; }
  });
}

function renderSection(t){
  updateBadges();
  if(t==='register') renderRegister();
  else if(t==='prospect') renderProspect();
  else if(t==='first') renderFirst();
  else if(t==='active') renderActive();
  else if(t==='enrolled') renderEnrolled();
  else if(t==='all') renderAll();
  else if(t==='check') renderCheck();
}

async function doRegister(){
  const name=document.getElementById('r-name').value.trim();
  const school=document.getElementById('r-school').value.trim();
  const grade=document.getElementById('r-grade').value;
  const apply_type=document.getElementById('r-apply-type').value;
  const apply_trigger=document.getElementById('r-apply-trigger').value;
  if(!name||!school||!grade){showToast('氏名・高校名・学年は必須です');return;}
  if(!apply_type||!apply_trigger){showToast('申込内容・きっかけを選択してください');return;}
  loader(true);
  try{
    await createStudent({name,school,grade,apply_type,apply_trigger,content:'',created_at:document.getElementById('r-date').value||TODAY,flow:'prospect',active_history:[],active_done_today:false});
    await loadStudents();
    showToast(name+'さんを登録しました');
    switchTab('prospect');
  }catch(e){showToast('エラーが発生しました');}
  loader(false);
}

async function saveProspect(id){
  const st=document.getElementById('m-ls').value;
  loader(true);
  try{
    await updateStudent(id,{lead_date:document.getElementById('m-ld').value||null,lead_status:st,lead_connected:st==='connected',lead_memo:document.getElementById('m-lm').value});
    await loadStudents();showToast('保存しました');closeModal();renderSection(currentTab);
  }catch(e){showToast('エラーが発生しました');}
  loader(false);
}

async function saveFirst(id,silent=false){
  const data={
    first_target:document.getElementById('m-ft')?.value||'',
    first_other_juku:document.getElementById('m-fo')?.value||'',
    first_consider_juku:document.getElementById('m-fc')?.value||'',
    first_type:document.getElementById('m-ftype')?.value||'',
    first_guidance_date:document.getElementById('m-fg')?.value||null,
    first_grade_status:document.getElementById('m-fgs')?.value||'',
    first_needs:document.getElementById('m-fn')?.value||'',
    first_note:document.getElementById('m-fb')?.value||'',
    teacher:document.getElementById('m-teacher')?.value||'',
    courses:[...selectedCourses]
  };
  await updateStudent(id,data);
  if(!silent){await loadStudents();showToast('保存しました');closeModal();renderSection(currentTab);}
}
async function saveFirstAndMove(id,flow){
  if(flow==='active'){
    const guidanceDate=document.getElementById('m-fg')?.value;
    if(!guidanceDate){showToast('ガイダンス日程を入力してから進めてください');return;}
  }
  loader(true);
  try{
    await saveFirst(id,true);
    const extra=flow==='enrolled'?{enrolled_date:TODAY}:{};
    await updateStudent(id,{flow,...extra});
    await loadStudents();showToast('移動しました');closeModal();switchTab(flow);
  }catch(e){showToast('エラーが発生しました');}
  loader(false);
}

// ---- ACTIVE ----
function renderActive(){
  const el=document.getElementById('section-active');
  let list=students.filter(s=>s.flow==='active' && !s.cancelled);
  let infoText='';
  if(activeSubTab==='today'){
    list=list.filter(s=>getVisitDate(s)===TODAY && !s.active_done_today);
    infoText='今日登校予定（対応完了後は非表示）';
  } else if(activeSubTab==='tomorrow'){
    list=list.filter(s=>getVisitDate(s)===TOMORROW);
    infoText='明日登校予定の生徒';
  }
  if(!list.length){
    el.innerHTML=(infoText?`<div class="info-note">${infoText}</div>`:'')+
      (activeSubTab==='today'?'<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">今日の対応はすべて完了しました</div></div>':emptyHTML('該当する生徒はいません'));
    return;
  }
  el.innerHTML=(infoText?`<div class="info-note">${infoText}</div>`:'')+
    `<div class="section-header">${list.length}名</div>`+
    list.map(s=>{
      const vDate=getVisitDate(s);
      const isToday=vDate===TODAY, isTomorrow=vDate===TOMORROW;
      const isPast=vDate && vDate<TODAY && !isToday;
      const cls='ticket'+(isToday?' today':(isTomorrow?' tomorrow':''))+(s.active_done_today?' done':'');
      const pl=(isToday||isTomorrow)?'ticket-pl':'';
      const koma=s.active_koma;
      const dateLabel=s.active_next_date?'次回: '+fmt(s.active_next_date):s.first_guidance_date?'ガイダンス: '+fmt(s.first_guidance_date):'日程未定';
      return `<div class="${cls} ${pl}" onclick="openTicket(${s.id})">
        <div class="ticket-row">
          <div>
            <div class="ticket-name">${s.name}</div>
            <div class="ticket-meta">${s.school} · ${s.grade}</div>
          </div>
          <span class="badge koma-badge ${komaClass(koma)}">残${komaLabel(koma)}</span>
        </div>
        ${isToday?'<span class="badge b-amber" style="margin-top:8px;display:inline-flex">今日登校</span>':''}
        ${isTomorrow&&!isToday?'<span class="badge b-blue" style="margin-top:8px;display:inline-flex">明日登校</span>':''}
        ${isPast?`<div style="display:inline-flex;align-items:center;gap:4px;margin-top:8px;background:#FCEBEB;color:#A32D2D;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600">⚠️ 次回日程が過去です</div>`:''}
        ${s.active_strategy?`<div style="font-size:12px;padding:7px 9px;background:var(--bg);border-radius:7px;margin-top:8px;color:var(--text2)">作戦: ${s.active_strategy}</div>`:''}
        <div class="ticket-footer">
          <span style="font-size:12px;color:${isPast?'#A32D2D':'var(--text3)'}">${dateLabel}</span>
          <span class="badge b-gray">${(s.active_history||[]).length}件</span>
        </div>
      </div>`;
    }).join('');
}

function openTicket(id){
  const s=students.find(s=>s.id===id);if(!s)return;
  const vDate=getVisitDate(s);
  const isToday=vDate===TODAY, isTomorrow=vDate===TOMORROW;
  const isPast=vDate && vDate<TODAY && !isToday;
  document.getElementById('modal-title').textContent=s.name+' — チケット';
  document.getElementById('modal-body').innerHTML=`
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
      <span class="badge b-teal">${s.school}</span><span class="badge b-blue">${s.grade}</span>
      ${isToday?'<span class="badge b-amber">今日登校</span>':''}
      ${isTomorrow&&!isToday?'<span class="badge b-blue">明日登校</span>':''}
      ${isPast?'<span class="badge b-red">⚠️ 次回日程が過去です</span>':''}
      ${s.first_guidance_date?`<span class="badge b-purple">ガイダンス: ${fmt(s.first_guidance_date)}</span>`:''}
    </div>
    <div class="form-row">
      <div class="form-group"><label>残りコマ数</label><select id="m-koma">${buildKomaOpts(s.active_koma)}</select></div>
      <div class="form-group"><label>次回登校日</label><input type="date" id="m-next" value="${s.active_next_date||''}"></div>
    </div>
    <div class="form-group"><label>作戦メモ</label><textarea id="m-strategy" rows="2">${s.active_strategy||''}</textarea></div>
    ${isToday?`
    <div class="today-zone">
      <div class="today-zone-title">今日の対応記録</div>
      <div class="form-group"><label>対応内容</label><textarea id="m-hist-new" rows="3" placeholder="今日の対応・会話内容・次回メモなど"></textarea></div>
      <button class="btn btn-primary btn-full" style="margin-top:4px" onclick="completeToday(${id})">対応記録を保存して完了 ✓</button>
    </div>`:''}
    <button class="btn btn-primary btn-full" style="margin-bottom:24px" onclick="saveTicket(${id})">保存</button>

      <button class="btn btn-full" style="background:var(--c5l);color:var(--c5);border-color:var(--c5)" onclick="confirmEnrolled(${id})">入学済みとして登録する</button>
    </div>
    <div class="divider"></div>
    <div class="section-header" style="margin-top:14px">対応履歴 (${(s.active_history||[]).length}件)</div>

      <div class="hist-item"><div class="hist-date">${fmt(h.date)}</div><div class="hist-text">${h.text}</div></div>`).join('')
    ||'<div style="font-size:13px;color:var(--text3)">まだ対応履歴はありません</div>'}`;
  openModal();
}

function confirmEnrolled(id){
  const s=students.find(s=>s.id===id);if(!s)return;
  if(confirm(`${s.name}さんを入学済みに移動しますか？`)) moveFlow(id,'enrolled');

async function saveTicket(id,extra={}){
  loader(true);

async function addHistory(id){
  const text=document.getElementById('m-hist-new')?.value.trim();
  if(!text){showToast('対応内容を入力してください');return;}
  const s=students.find(s=>s.id===id);if(!s)return;
  const hist=[...(s.active_history||[]),{date:TODAY,text}];
  loader(true);
  try{
    const koma=document.getElementById('m-koma')?.value;
    await updateStudent(id,{active_history:hist,active_koma:koma===''?null:parseInt(koma),active_next_date:document.getElementById('m-next')?.value||null,active_strategy:document.getElementById('m-strategy')?.value||''});
    await loadStudents();showToast('記録を追加しました');closeModal();openTicket(id);
  }catch(e){showToast('エラーが発生しました');}
  loader(false);
}

async function completeToday(id){
  const text=document.getElementById('m-hist-new')?.value.trim();
  const s=students.find(s=>s.id===id);if(!s)return;
  const hist=text?[...(s.active_history||[]),{date:TODAY,text}]:(s.active_history||[]);

  try{
    const koma=document.getElementById('m-koma')?.value;
    await updateStudent(id,{active_history:hist,active_done_today:true,active_koma:koma===''?null:parseInt(koma),active_next_date:document.getElementById('m-next')?.value||null,active_strategy:document.getElementById('m-strategy')?.value||''});
    await loadStudents();showToast('対応完了しました ✓');closeModal();renderSection(currentTab);
  }catch(e){showToast('エラーが発生しました');}
  loader(false);
}

async function doCancel(id){

  if(!reason){showToast('キャンセル理由を選択してください');return;}
  loader(true);
  try{
    await updateStudent(id,{cancelled:true,cancel_reason:reason});
    await loadStudents();showToast('キャンセル処理しました');closeModal();renderAll();updateBadges();
  }catch(e){showToast('エラーが発生しました');}
  loader(false);
}

async function deleteStudent(id, name){
  if(!confirm(`「${name}」のデータを完全に削除します。\nこの操作は取り消せません。本当に削除しますか？`)) return;
  if(!confirm(`最終確認：「${name}」を完全削除してよいですか？`)) return;
  loader(true);
  try{
    await fetch(API+`?id=eq.${id}`, {method:'DELETE', headers:HEADERS});
    await loadStudents();showToast('完全削除しました');renderAll();updateBadges();
  }catch(e){showToast('エラーが発生しました');}
  loader(false);
}

let parsedWebApplicants = [];

function renderCheck(){
  const el=document.getElementById('section-check');
  const bmCode=`(function(){
  // frameBody(MAINFRAME > frameBody)を直接取得
  var rows=[];
  try{
    var mainFrame=document.querySelector('frame[name="MAINFRAME"]');
    if(mainFrame){
      var mainDoc=mainFrame.contentDocument||mainFrame.contentWindow.document;
      var bodyFrame=mainDoc.querySelector('frame[name="frameBody"]');
      if(bodyFrame){
        var bodyDoc=bodyFrame.contentDocument||bodyFrame.contentWindow.document;
        rows=Array.from(bodyDoc.querySelectorAll('tr'));
      }
    }
  }catch(e){}
  // 取得できなかった場合は全ドキュメントから最大tr数を探す
  if(rows.length<2){
    function getAllDocs(win,depth){
      if(depth>5)return[];

function loadCSV(input){
  const file = input.files[0];
  if(!file){return;}
  const reader = new FileReader();
  reader.onload = function(e){
    const text = e.target.result;
    // 文字化け対策：ShiftJISの場合も試みる
    parseCSVAndCheck(text);
  };
  // まずUTF-8で試す
  reader.readAsText(file, 'UTF-8');
  // UTF-8で文字化けしたらShiftJISで再読み込み
  reader.onerror = function(){
    const reader2 = new FileReader();
    reader2.onload = function(e){ parseCSVAndCheck(e.target.result); };
    reader2.readAsText(file, 'Shift-JIS');
  };
}

function parseCSVAndCheck(text){
  // 文字化けチェック：文字化けしていたらShiftJISで再試行
  const area = document.getElementById('check-result');

  const lines = text.trim().split('\n').filter(l=>l.trim());
  if(lines.length < 2){
    if(area) area.innerHTML=`<div class="card" style="border-left:3px solid #A32D2D"><div style="font-size:13px;color:#A32D2D">CSVの行数が少なすぎます（${lines.length}行）。正しいCSVファイルか確認してください。</div></div>`;
    return;
  }

  // ヘッダー行を探す（ID,年度... または 漢字姓などの列名を含む行）
  let headerIdx = 0;
  let lastIdx = -1, kanaIdx = -1, schoolIdx = -1, gradeIdx = -1, applyIdx = -1, dateIdx = -1;

  for(let i=0;i<Math.min(5,lines.length);i++){
    const cols = splitCSVLine(lines[i]);
    // ヘッダー行の特定
    if(cols.some(c=>c.includes('漢字姓')||c.includes('ID')||c==='ID')){
      headerIdx = i;
      cols.forEach((c,idx)=>{
        if(c.includes('漢字姓')) lastIdx=idx;
        if(c.includes('漢字名')) kanaIdx=idx;
        if(c.includes('学校名')) schoolIdx=idx;
        if(c.includes('学年コード')) gradeIdx=idx;
        if(c.includes('希望内容')) applyIdx=idx;
        if(c.includes('登録日時')) dateIdx=idx;
      });
      break;
    }
  }

  // ヘッダーが見つからない場合は列位置を固定値で推定
  // スクリーンショットから: ID(0) 年度(1) 生徒番号(2) 処理済(3) 校舎(4) 登録日時(5) 希望内容(6) 希望資料(7) 希望校舎(8) 希望校舎コード(9) 漢字姓(10) 漢字名(11) カナ姓(12) カナ名(13) 性別(14) 生年月日(15) ... 学校名(24) 学校設置区分(25) 学年コード(26)
  if(lastIdx===-1){ lastIdx=10; kanaIdx=11; schoolIdx=24; gradeIdx=26; applyIdx=6; dateIdx=5; }

  const gradeMap={'31':'高1','32':'高2','33':'高3','34':'高卒','21':'中1','22':'中2','23':'中3'};
  const results=[];
  const seen=new Set();

  for(let i=headerIdx+1;i<lines.length;i++){
    const cols=splitCSVLine(lines[i]);
    if(cols.length < 10) continue;
    if(!/^\d{7,}/.test((cols[0]||'').trim())) continue;

    const lastName=(cols[lastIdx]||'').trim();
    const firstName=(cols[kanaIdx]||'').trim();
    if(!lastName||!firstName) continue;

    const name=lastName+' '+firstName;
    const key=name.replace(/\s/g,'');
    if(seen.has(key)) continue;
    seen.add(key);

    const school=(cols[schoolIdx]||'').trim().replace('高等学校','高校');
    const grade=gradeMap[(cols[gradeIdx]||'').trim()]||'';
    const applyRaw=(cols[applyIdx]||'').trim();
    let applyLabel='その他';
    if(applyRaw.includes('1日体験')||applyRaw.includes('１日体験')) applyLabel='１日体験';
    else if(applyRaw.includes('資料請求')) applyLabel='資料請求';
    else if(applyRaw.includes('招待講習')||applyRaw.includes('招待状請求')) applyLabel='招待講習';
    else if(applyRaw.includes('公開授業')) applyLabel='公開授業';

    const dateRaw=(cols[dateIdx]||'').trim();
    const applyDate=dateRaw.slice(0,10).replace(/\//g,'-')||TODAY;

    results.push({name,lastName,firstName,school,grade,applyLabel,triggerLabel:'その他',applyDate});
  }

  if(!results.length){
    if(area) area.innerHTML=`<div class="card" style="border-left:3px solid #A32D2D">
      <div style="font-size:13px;color:#A32D2D;font-weight:600;margin-bottom:8px">⚠️ データを読み取れませんでした</div>

    </div>`;
    return;
  }

  parsedWebApplicants=results;
  renderCheckResult();
}

function splitCSVLine(line){
  const result=[];
  let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else{cur+=c;}
  }
  result.push(cur);
  return result;
}

function parseWebData(text){
  // 改行がない場合でも「数字7桁以上 2026」のパターンで行分割
  let normalized = text.trim();
  // 行が1行しかない、または極端に長い行がある場合は分割
  const rawLines = normalized.split('\n');
  let lines = [];
  for(const raw of rawLines){
    const t = raw.trim();
    if(!t) continue;
    // 1行に複数レコードが詰まっている場合（7桁ID + 2026 パターンで分割）
    const parts = t.split(/(?=\d{7,}\s+2026\s)/);
    for(const p of parts){
      if(p.trim()) lines.push(p.trim());
    }
  }

  const results = [];
  for(const line of lines){
    const t = line.trim();
    if(!/^\d{7,}/.test(t)) continue;

    // 校舎コード「0015」の直後の姓名を抽出
    const nameMatch = t.match(/0015\s+([\u4e00-\u9fff\u3400-\u4dbf々〆〇ヶ一-龯?？]+)\s+([\u4e00-\u9fff\u3400-\u4dbf々〆〇ヶ一-龯?？a-zA-Zａ-ｚＡ-Ｚひ-ん]+)\s+[\u30A0-\u30FF]/);
    if(!nameMatch) continue;

    const lastName  = nameMatch[1];
    const firstName = nameMatch[2];
    const name = lastName + ' ' + firstName;

    // 申込日
    const dateMatch = t.match(/(\d{4}\/\d{2}\/\d{2})/);
    const applyDate = dateMatch ? dateMatch[1].replace(/\//g,'-') : TODAY;

    // 申込内容
    let applyLabel = 'その他';
    if(t.includes('1日体験')||t.includes('１日体験')) applyLabel='１日体験';
    else if(t.includes('資料請求')) applyLabel='資料請求';
    else if(t.includes('招待講習')||t.includes('招待状請求')) applyLabel='招待講習';
    else if(t.includes('公開授業')) applyLabel='公開授業';

    // 学年コード：最後の「高等学校」「中学校」の直後を参照
    let grade = '';
    const gradeMap = {'31':'高1','32':'高2','33':'高3','34':'高卒','21':'中1','22':'中2','23':'中3'};
    const schoolTypeMatches = [...t.matchAll(/(?:高等学校|中学校)/g)];
    if(schoolTypeMatches.length > 0){
      const lastMatch = schoolTypeMatches[schoolTypeMatches.length-1];
      const afterSchool = t.slice(lastMatch.index + lastMatch[0].length);
      const gm = afterSchool.match(/\s+(3[1-4]|2[1-3])\s/);
      if(gm) grade = gradeMap[gm[1]]||'';
    }

    // 学校名
    const schoolMatch = t.match(/(?:神奈川県|東京都|埼玉県|千葉県|静岡県)\s+([^\s　]+(?:高等学校|高校|中学校|中学|高院|学院|高専))/);
    const school = schoolMatch ? schoolMatch[1].replace('高等学校','高校') : '';

    // きっかけ
    let triggerLabel = 'その他';
    if(t.includes('友人')||t.includes('知人')) triggerLabel='友人紹介';
    else if(t.includes('配布')) triggerLabel='配布';
    else if(t.includes('帳票')) triggerLabel='帳票返却面談';

    results.push({name, lastName, firstName, school, grade, applyLabel, triggerLabel, applyDate});
  }

  // 重複除去（同じ氏名）
  const seen = new Set();
  return results.filter(r=>{
    const key = r.name.replace(/\s/g,'');
    if(seen.has(key)) return false;
    seen.add(key); return true;
  });
}

  area.innerHTML=`
    <div class="section-header" style="color:${unregistered.length?'#A32D2D':'var(--c1)'}">
      ${unregistered.length?`⚠️ 未登録: ${unregistered.length}名`:'✅ 全員登録済みです'}
    </div>
    ${unregistered.map(a=>`
    <div class="card" style="border-left:3px solid #A32D2D">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px">
        <div>
          <div style="font-size:15px;font-weight:600">${a.name}</div>
          <div style="font-size:12px;color:var(--text2)">${a.school} · ${a.grade}</div>
        </div>
        <span class="badge b-red">未登録</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        <span class="badge b-amber">${a.applyLabel}</span>
        <span class="badge b-purple">きっかけ: ${a.triggerLabel}</span>
        <span class="badge b-gray">申込: ${fmt(a.applyDate)}</span>
      </div>
      <button class="btn btn-primary btn-full btn-sm" onclick="quickRegister('${a.name.replace(/'/g,"\\'")}','${a.school.replace(/'/g,"\\'")}','${a.grade}','${a.applyLabel}','${a.triggerLabel}','${a.applyDate}')">
        このまま見込へ登録する →
      </button>
    </div>`).join('')}
    ${already.length?`
    <div class="section-header" style="margin-top:16px;color:var(--c1)">✅ 登録済み: ${already.length}名</div>
    ${already.map(a=>`
    <div class="card" style="opacity:.6">
      <div class="card-header">
        <div class="card-info"><div class="card-name">${a.name}</div><div class="card-meta">${a.school} · ${a.grade}</div></div>
        <span class="badge b-teal">登録済</span>
      </div>
    </div>`).join('')}`:''}`;
}

async function quickRegister(name,school,grade,applyLabel,triggerLabel,applyDate){
  if(!confirm(`${name}さんを見込に登録しますか？`)) return;
  const parts=name.split(' ');
  loader(true);
  try{
    await createStudent({
      name,school,grade,
      apply_type:applyLabel,
      apply_trigger:triggerLabel,
      content:'',
      created_at:applyDate||TODAY,
      flow:'prospect',
      active_history:[],
      active_done_today:false
    });
    await loadStudents();
    showToast(name+'さんを登録しました');
    renderCheckResult();
  }catch(e){showToast('エラーが発生しました');}
  loader(false);
}

// ---- UTILS ----
function emptyHTML(msg){ return `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">${msg}</div></div>`; }

// ---- PASSWORD ----
const PW = 'fujisawa0015';
function checkPw(){
  const val=document.getElementById('pw-input').value;
  if(val===PW){
    sessionStorage.setItem('pw_ok','1');
    document.getElementById('pw-screen').classList.add('hidden');
    init();
  } else {
    const err=document.getElementById('pw-error');
    err.style.display='block';
    document.getElementById('pw-input').value='';
    setTimeout(()=>err.style.display='none',2500);
  }
}

// ---- INIT ----
async function init(){
  loader(true);
  try{
    await loadStudents();
    switchTab('register');
  }catch(e){
    document.getElementById('loader').innerHTML='<p style="color:#A32D2D;padding:20px;text-align:center">接続エラー。ページを再読み込みしてください。</p>';
    return;
  }
  loader(false);
}

// ---- STARTUP ----
if(sessionStorage.getItem('pw_ok')==='1'){
  document.getElementById('pw-screen').classList.add('hidden');
  init();
}
</script>
